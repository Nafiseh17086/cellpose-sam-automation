name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal deps (no torch — CPU-only smoke test)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas tifffile scikit-image matplotlib

      - name: Syntax check
        run: python -m py_compile cellpose_sam_automation.py

      - name: CLI --help renders
        run: python cellpose_sam_automation.py --help
